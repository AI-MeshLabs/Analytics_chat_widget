services:
  analytics-chat-widget:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-chat-widget
    ports:
      - "4003:4003"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_DB_SCHEMA: ${SUPABASE_DB_SCHEMA:-onepoint}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      PROJECTDB_URL: ${PROJECTDB_URL}
      PROJECTDB_USE_DIRECT: ${PROJECTDB_USE_DIRECT:-false}
    restart: unless-stopped
