services:
  analytics-chat-widget:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: analytics-chat-widget
    ports:
      - "4003:4003"
    environment:
      NODE_ENV: production
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
    restart: unless-stopped
